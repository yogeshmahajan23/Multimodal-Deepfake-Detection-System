<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeepFake & Binary Analyzer | DeepByte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f4; 
          }
          
          .container { 
            max-width: 600px; 
            margin: auto; 
            padding: 20px; 
            text-align: center; 
          }
          
          .upload-box { 
            border: 2px dashed #ccc; 
            padding: 40px; 
            background-color: white; 
            cursor: pointer; 
            margin-top: 20px; 
          }
          
          .upload-box:hover { 
            border-color: #888; 
          }
          
          .button { 
            background-color: #3498db; 
            color: white; 
            padding: 12px 20px; 
            margin: 10px; 
            border: none; 
            cursor: pointer; 
          }
          
          .button:hover { 
            background-color: #2980b9; 
          }
          
          .instruction { 
            font-size: 16px; 
            font-weight: bold; 
            color: #555; 
            margin-bottom: 15px; 
          }
          
          .progress-bar-container { 
            width: 100%; 
            background-color: #ddd; 
            border-radius: 5px; 
            height: 10px; 
            margin-top: 10px; 
          }
          
          .progress-bar { 
            width: 0%; 
            height: 100%; 
            background-color: #3498db; 
            border-radius: 5px; 
            transition: width 1s ease-in-out; 
          }
          
          .loading { 
            display: none; 
            font-size: 18px; 
            color: #3498db; 
            font-weight: bold; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2); 
          }
          
          .binary-structure { 
            display: none; 
            text-align: left; 
            background-color: white; 
            padding: 10px; 
            border-radius: 5px; 
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.1); 
            margin-top: 20px; 
          }

          .side-panel {
            position: fixed;
            top: 56px;
            left: -220px;
            width: 200px;
            height: calc(100% - 56px);
            background-color: #212529;
            color: white;
            padding: 20px;
            transition: left 0.3s ease;
            z-index: 1050;
          }
      
          .side-panel.open {
            left: 0;
          }
      
          .side-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
          }
      
          .side-panel li {
            margin-bottom: 20px;
          }
      
          .side-panel a {
            color: white;
            text-decoration: none;
            font-weight: 500;
          }
    </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <div class="d-flex justify-content-between w-100 align-items-center">
      <span class="navbar-brand fw-bold text-white">DeepFake</span>
      <button class="btn btn-dark fs-6 border-0" onclick="toggleSideMenu()">☰</button>
    </div>
  </nav>

  <!-- Sidebar -->
  <div id="sidePanel" class="side-panel">
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/file">Files</a></li>
      <li>
        <a href="#" onclick="document.getElementById('fileInput').click(); return false;">Upload File</a>
        <input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(this.files[0])">
      </li>
      <li><a href="/contactus">Contact Us</a></li>
    </ul>
  </div>

   {% if messages %}
   {% for message in messages %}
     <div class="alert alert-{{ message.tags }} alert-dismissible fade show my-0" role="alert">
  <strong>{{ message }}</strong>
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
    {% endfor %}
    {% endif %}
    

    
   
    {% block body %}{% endblock body %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    
    <input type="file" id="fileInput" accept="image/*, audio/*, video/*, application/octet-stream" style="display: none;" onchange="handleFileUpload()">
    

    <script>

      function toggleSideMenu() {
        document.getElementById('sidePanel').classList.toggle('open');
      }
  
      function handleFileUpload(file) {
        if (file) {
          alert("Selected file: " + file.name);
          // Optional: Submit via JavaScript or AJAX if needed
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        console.log("DEBUG: DOM fully loaded — waiting for user action.");
    
        const uploadForm = document.querySelector(".exe-form");
        const nameInput = document.querySelector("input[name='name']");
        const fileInput = document.querySelector("input[name='file']");
        const uploadButton = document.querySelector("button[type='submit']");
    
        if (!uploadForm || !nameInput || !fileInput || !uploadButton) {
            console.error("ERROR: Upload form elements not found!");
            return;
        }
    
        console.log("DEBUG: Form elements found successfully!");
    
        uploadForm.addEventListener("submit", function (event) {
            event.preventDefault();
    
            const formData = new FormData(uploadForm);
    
            // Optional: Double-check fields before sending
            if (!formData.get("name") || !formData.get("file")) {
                alert("Please enter a name and choose a file before uploading.");
                return;
            }
    
            console.log("DEBUG: Name =", formData.get("name"));
            console.log("DEBUG: File =", formData.get("file"));
    
            fetch("/upload_exe/", {
                method: "POST",
                body: formData,
                headers: {
                    "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log("DEBUG: Upload succeeded.");
                    alert("File uploaded successfully!");
                    location.reload();
                } else {
                    console.error("ERROR: Upload failed.", data.error);
                    alert("Upload failed: " + data.error);
                }
            })
            .catch(error => {
                console.error("ERROR: Network or server issue!", error);
                alert("Upload failed: Network error.");
            });
        });
    });
        

             </script>
                
                
             {% load static %}
             <script src="{% static 'js/upload_exe.js' %}"></script>  <!-- ✅ Correct -->
                </body>
                </html>
